<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="460" viewBox="0 0 1100 460">
  <rect width="1100" height="460" fill="#f8fafc"/>
  <text x="60" y="58" font-size="30" font-family="Segoe UI, Arial, sans-serif" fill="#0f172a" font-weight="700">Distance Method: Signal Pipeline</text>
  <text x="60" y="88" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">What actually creates an entry signal in the current implementation.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="60" y="140" rx="18" ry="18" width="170" height="92" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="145" y="175" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" fill="#1e3a8a" font-weight="700">Aligned Bars</text>
  <text x="145" y="203" text-anchor="middle" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#1e3a8a">close_1, close_2</text>

  <rect x="280" y="140" rx="18" ry="18" width="185" height="92" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="372" y="175" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" fill="#14532d" font-weight="700">Normalize</text>
  <text x="372" y="203" text-anchor="middle" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#14532d">close / first close</text>

  <rect x="515" y="140" rx="18" ry="18" width="165" height="92" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="597" y="175" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" fill="#92400e" font-weight="700">Spread</text>
  <text x="597" y="203" text-anchor="middle" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#92400e">norm_1 - norm_2</text>

  <rect x="730" y="140" rx="18" ry="18" width="165" height="92" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="812" y="175" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" fill="#991b1b" font-weight="700">Rolling Stats</text>
  <text x="812" y="203" text-anchor="middle" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#991b1b">mean/std on lookback</text>

  <rect x="60" y="300" rx="18" ry="18" width="210" height="98" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="165" y="336" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" fill="#5b21b6" font-weight="700">Z-Score</text>
  <text x="165" y="366" text-anchor="middle" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#5b21b6">(spread - mean) / std</text>

  <rect x="335" y="300" rx="18" ry="18" width="220" height="98" fill="#fae8ff" stroke="#d946ef" stroke-width="2"/>
  <text x="445" y="336" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" fill="#86198f" font-weight="700">Previous Bar Only</text>
  <text x="445" y="366" text-anchor="middle" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#86198f">signal = zscore[idx - 1]</text>

  <rect x="620" y="300" rx="18" ry="18" width="210" height="98" fill="#cffafe" stroke="#06b6d4" stroke-width="2"/>
  <text x="725" y="336" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" fill="#155e75" font-weight="700">Entry Rule</text>
  <text x="725" y="366" text-anchor="middle" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#155e75">± entry_z threshold</text>

  <rect x="875" y="300" rx="18" ry="18" width="165" height="98" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="957" y="336" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" fill="#991b1b" font-weight="700">Open Trade</text>
  <text x="957" y="366" text-anchor="middle" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#991b1b">fill at next open</text>

  <line x1="230" y1="186" x2="280" y2="186" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="465" y1="186" x2="515" y2="186" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="680" y1="186" x2="730" y2="186" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="812" y1="232" x2="812" y2="280" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="270" y1="349" x2="335" y2="349" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="555" y1="349" x2="620" y2="349" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="830" y1="349" x2="875" y2="349" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="60" y="430" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Not part of the entry signal: bollinger_k, stop_z, commissions, slippage, leverage, margin budget.</text>
</svg>
